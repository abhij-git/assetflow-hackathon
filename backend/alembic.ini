# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration files
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# sys.path path, prefixed by ',' or ';'
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# timezone =

# limit the conversion of the sql_level to these options:
# truncate_long_names = True

# version locations.
# version_locations = %(here)s/bar:%(here)s/bat

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# logging configuration
# [loggers], [handlers], [qualnames], [formatters]
# are defined below.

sqlalchemy.url = postgresql+asyncpg://assetflow:assetflow123@postgres:5432/assetflow

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
